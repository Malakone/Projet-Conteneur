apiVersion: apps/v1
kind: Deployment
metadata:
  name: techlogix-inventory-deployment
  labels:
    app: techlogix-inventory
spec:
  replicas: 3
  selector:
    matchLabels:
      app: techlogix-inventory
  template:
    metadata:
      labels:
        app: techlogix-inventory
    spec:
      containers:
      - name: inventory-app
        image: laminekone/techlogix-inventory:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5